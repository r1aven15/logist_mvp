<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>3D загрузка рейс #{{ route.id }}</title>
    <style>
        body { margin: 0; overflow: hidden; font-family: Arial; }
        #info { position: absolute; top: 10px; left: 10px; background: rgba(0,0,0,0.7); color: white; padding: 10px; border-radius: 5px; z-index: 100; }
    </style>
</head>
<body>
<div id="info">
    <h2>Рейс #{{ route.id }} | {{ vehicle.name }} {{ vehicle.plate }}</h2>
    <p>Кузов: {{ truck_size[0] }}×{{ truck_size[1] }}×{{ truck_size[2] }} м</p>
    <p>Паллет: {{ placed_pallets|length }} шт.</p>
    <small>Перемещайте сцену мышью</small>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
<script>
// Данные из Flask
const pallets = {{ placed_pallets|tojson }};
const truckSize = {{ truck_size|tojson }}; // [l, h, w]

// Настройка сцены
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xeeeeee);

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(truckSize[0]*2, truckSize[1]*2, truckSize[2]*2);
camera.lookAt(truckSize[0]/2, truckSize[1]/2, truckSize[2]/2);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

// Controls
const controls = new THREE.OrbitControls(camera, renderer.domElement);
controls.target.set(truckSize[0]/2, truckSize[1]/2, truckSize[2]/2);
controls.update();

// Свет
const ambientLight = new THREE.AmbientLight(0x404040, 0.8);
scene.add(ambientLight);
const directionalLight = new THREE.DirectionalLight(0xffffff, 0.6);
directionalLight.position.set(10, 20, 10);
scene.add(directionalLight);

// Рисуем кузов (полупрозрачный)
const truckGeom = new THREE.BoxGeometry(truckSize[0], truckSize[1], truckSize[2]);
const truckMat = new THREE.MeshPhongMaterial({ color: 0x888888, wireframe: false, transparent: true, opacity: 0.2 });
const truck = new THREE.Mesh(truckGeom, truckMat);
truck.position.set(truckSize[0]/2, truckSize[1]/2, truckSize[2]/2);
scene.add(truck);

// Контурные линии кузова
const edges = new THREE.EdgesGeometry(truckGeom);
const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x000000 }));
truck.add(line);

// Цвета для разных паллет
const colors = [0xff6347, 0x87ceeb, 0x32cd32, 0xffa500, 0x9b59b6, 0xf0e68c, 0xe74c3c, 0x2ecc71];
let colorIdx = 0;

// Добавляем паллеты
pallets.forEach(p => {
    const [l, h, w] = p.size; // размеры, определённые паллетом (могут быть развёрнуты)
    const geom = new THREE.BoxGeometry(l, h, w);
    const color = colors[colorIdx % colors.length];
    const mat = new THREE.MeshPhongMaterial({ color: color, transparent: true, opacity: 0.7 });
    const mesh = new THREE.Mesh(geom, mat);
    // Координаты из позиции (x,y,z)
    mesh.position.set(p.position[0] + l/2, p.position[1] + h/2, p.position[2] + w/2);
    scene.add(mesh);

    // Подпись (просто имя паллеты)
    // Для простоты создадим sprite с номером или названием
    const canvas = document.createElement('canvas');
    canvas.width = 128;
    canvas.height = 64;
    const ctx = canvas.getContext('2d');
    ctx.fillStyle = 'black';
    ctx.font = '20px Arial';
    ctx.fillText(`Пал.${p.pallet_index}`, 10, 40);
    const texture = new THREE.CanvasTexture(canvas);
    const spriteMat = new THREE.SpriteMaterial({ map: texture });
    const sprite = new THREE.Sprite(spriteMat);
    sprite.position.copy(mesh.position);
    sprite.position.y += h/2 + 0.1;
    sprite.scale.set(0.8, 0.4, 1);
    scene.add(sprite);

    colorIdx++;
});

// Анимация
function animate() {
    requestAnimationFrame(animate);
    controls.update();
    renderer.render(scene, camera);
}
animate();

// Обработка изменения размера окна
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});
</script>
</body>
</html>
